<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="shortcut icon"
      href="./logoosebocultural.jpg"
      type="image/x-icon"
    />
    <title>Gerador de Etiquetas - O Sebo Cultural</title>
  </head>
  <body>
    <img alt="Logo O Sebo Cultural" class="logo-topo" id="logo-topo" />

    <div class="formulario">
      <label for="status-pago">Status do Pedido:</label>
      <div class="checkbox-group status-group">
        <div class="linha-status">
          <label>
            <input
              type="radio"
              id="status-pago"
              name="status"
              value="pago"
              checked
            />
            Pedido Pago
          </label>
          <label>
            <input
              type="radio"
              id="status-nao-pago"
              name="status"
              value="nao_pago"
            />
            Pedido Não Pago
          </label>
        </div>
        <div class="linha-status">
          <label>
            <input
              type="radio"
              id="status-ev-amazon"
              name="status"
              value="ev_amazon"
            />
            Pedido EV/Amazon
          </label>
        </div>
      </div>

      <div id="campo-reserva" style="display: none">
        <label for="reserva">Número da Reserva:</label>
        <input
          type="text"
          id="reserva"
          placeholder="Digite o número da reserva"
        />
      </div>

      <div id="campo-pedido">
        <label for="pedido">Número do Pedido:</label>
        <input
          type="text"
          id="pedido"
          placeholder="Digite o número do pedido"
        />
      </div>

      <div id="campo-canal" style="display: none">
        <label for="canal-balcao">Canal de Atendimento:</label>
        <div class="checkbox-group">
          <label>
            <input
              type="radio"
              id="canal-balcao"
              name="canal"
              value="Balcão"
              checked
            />
            Balcão
          </label>
          <label>
            <input type="radio" id="canal-site" name="canal" value="Site" />
            Site
          </label>
          <label>
            <input
              type="radio"
              id="canal-whatsapp"
              name="canal"
              value="Whatsapp"
            />
            Whatsapp
          </label>
          <label>
            <input
              type="radio"
              id="canal-telefone"
              name="canal"
              value="Telefone"
            />
            Telefone
          </label>
        </div>
      </div>

      <label for="local-centro" id="label-local">Local de Retirada:</label>
      <div class="checkbox-group">
        <label>
          <input
            type="radio"
            id="local-centro"
            name="local"
            value="Centro"
            checked
          />
          Centro
        </label>
        <label>
          <input
            type="radio"
            id="local-bancarios"
            name="local"
            value="Bancários"
          />
          Bancários
        </label>
        <label>
          <input
            type="radio"
            id="local-manaira"
            name="local"
            value="Manaíra"
          />
          Manaíra
        </label>
      </div>

      <label for="cliente" id="label-cliente">Nome do Cliente:</label>
      <input type="text" id="cliente" placeholder="Digite o nome do cliente" />

      <label for="telefone" id="label-telefone">Telefone:</label>
      <input type="text" id="telefone" placeholder="(DDD) 9XXXX-XXXX" />

      <label for="data-limite">Data Limite para Retirada:</label>
      <input type="text" id="data-limite" readonly />

      <button type="button" id="botao-imprimir">Gerar Etiqueta</button>
    </div>

    <div class="etiqueta" id="etiqueta"></div>

    <script src="logo-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
